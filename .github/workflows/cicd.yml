name: DevOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t devops-lab-app ./app-v3

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s-v3/deployment-v3.yml
          kubectl apply -f k8s-v3/service-v3.yml
